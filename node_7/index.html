<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NODE_7</title>
  <style>
    :root {
      --bg: #000000;
      --fg: #00e995;
      --fg-dim: rgba(0, 233, 149, 0.62);
      --fg-faint: rgba(0, 233, 149, 0.28);
      --danger: #ff5a5a;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: monospace;
      min-height: 100%;
      overflow-x: hidden;
    }

    body {
      position: relative;
      padding: 18px;
    }

    /* Subtle screen texture */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.02) 0px,
          rgba(255,255,255,0.02) 1px,
          transparent 2px,
          transparent 4px
        );
      opacity: 0.08;
      pointer-events: none;
      z-index: 2;
    }

    /* Soft vignette */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, transparent 55%, rgba(0,0,0,0.45) 100%);
      pointer-events: none;
      z-index: 2;
    }

    #scanline {
      position: fixed;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(0, 233, 149, 0.18);
      box-shadow: 0 0 14px rgba(0, 233, 149, 0.28);
      animation: scan 8s linear infinite;
      pointer-events: none;
      z-index: 3;
    }

    @keyframes scan {
      0% { top: 0%; opacity: 0.12; }
      50% { opacity: 0.22; }
      100% { top: 100%; opacity: 0.08; }
    }

    #noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.035;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.6) 0.5px, transparent 1px),
        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.4) 0.5px, transparent 1px),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.4) 0.5px, transparent 1px);
      background-size: 140px 140px, 180px 180px, 220px 220px;
      animation: drift 16s linear infinite;
    }

    @keyframes drift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-12px, 8px); }
    }

    #terminal-wrap {
      position: relative;
      z-index: 4;
      max-width: 1100px;
      margin: 0 auto;
    }

    #header {
      color: var(--fg-faint);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(0, 233, 149, 0.12);
      padding-bottom: 10px;
    }

    #terminal {
      white-space: pre-wrap;
      line-height: 1.45em;
      min-height: 72vh;
      padding-bottom: 14px;
      text-shadow: 0 0 3px rgba(0, 233, 149, 0.18);
    }

    #input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 4;
      border-top: 1px solid rgba(0, 233, 149, 0.12);
      padding-top: 12px;
    }

    #prompt {
      color: var(--fg);
      opacity: 0.9;
      font-size: 18px;
    }

    #input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--fg);
      font-family: monospace;
      font-size: 16px;
      width: 100%;
      caret-color: var(--fg);
      text-shadow: 0 0 4px rgba(0, 233, 149, 0.22);
    }

    a {
      color: #7effca;
      text-decoration: underline;
    }

    .faint {
      color: var(--fg-faint);
    }

    .warn {
      color: var(--danger);
    }

    .glitch {
      animation: glitchFlash 0.11s linear 3;
    }

    @keyframes glitchFlash {
      0%   { opacity: 1; transform: translateX(0); }
      20%  { opacity: 0.74; transform: translateX(-2px); }
      40%  { opacity: 1; transform: translateX(2px); }
      60%  { opacity: 0.78; transform: translateX(-1px); }
      80%  { opacity: 1; transform: translateX(1px); }
      100% { opacity: 1; transform: translateX(0); }
    }

    .fade-in {
      animation: fadeIn 0.35s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .blink {
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="noise"></div>
  <div id="scanline"></div>

  <div id="terminal-wrap">
    <div id="header">NODE_7 // relay environment // non-public channel</div>
    <div id="terminal"></div>

    <div id="input-row">
      <span id="prompt">></span>
      <input id="input" autocomplete="off" autofocus />
    </div>
  </div>

  <script>
    const terminal = document.getElementById("terminal");
    const input = document.getElementById("input");
    const terminalWrap = document.getElementById("terminal-wrap");

    let stage = "login_user";
    let loginUser = "";
    let commsUnlocked = false;

    const SECOND_USER = "rain.wlr";
    const SECOND_PASS = "open.channel";
    const PHONE_NUMBER = "+1 XXX XXX XXXX"; // REPLACE THIS
    const FILE_LINKS = [
      { label: "/files/archive_01.zip", href: "/files/archive_01.zip" },
      { label: "/files/node_fragment.png", href: "/files/node_fragment.png" },
      { label: "/files/audio_log_01.wav", href: "/files/audio_log_01.wav" }
    ];

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function scrollDown() {
      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
      terminal.scrollTop = terminal.scrollHeight;
    }

    function triggerGlitch() {
      terminalWrap.classList.remove("glitch");
      void terminalWrap.offsetWidth;
      terminalWrap.classList.add("glitch");
    }

    function randomCorrupt(text) {
      const pool = ["▒", "▓", "░", "̴", "̵", "̷"];
      let out = "";
      for (const ch of text) {
        if (ch !== " " && Math.random() < 0.06) {
          out += pool[Math.floor(Math.random() * pool.length)];
        } else {
          out += ch;
        }
      }
      return out;
    }

    async function typeLine(text = "", speed = 16) {
      const line = document.createElement("div");
      line.className = "fade-in";
      terminal.appendChild(line);

      for (let i = 0; i < text.length; i++) {
        line.textContent += text[i];
        if (i % 2 === 0) scrollDown();
        await sleep(speed);
      }

      scrollDown();
    }

    async function typeHTMLLine(html) {
      const line = document.createElement("div");
      line.className = "fade-in";
      line.innerHTML = html;
      terminal.appendChild(line);
      scrollDown();
      await sleep(50);
    }

    async function printUserInput(value) {
      const line = document.createElement("div");
      line.textContent = value;
      terminal.appendChild(line);
      scrollDown();
      await sleep(30);
    }

    async function bootSequence() {
      await typeLine("> node signature located :: NODE_7", 18);
      await sleep(250);
      await typeLine("> secondary route integrity :: unstable", 18);
      await sleep(250);
      await typeLine("> public shell bypass confirmed", 18);
      await sleep(250);
      triggerGlitch();
      await typeLine(randomCorrupt("> relay desync residuals detected"), 15);
      await sleep(300);
      await typeLine("", 10);
      await typeLine("username:", 18);
    }

    async function loginSuccessSequence() {
      await typeLine("", 10);
      await typeLine("> route accepted", 18);
      await sleep(400);
      triggerGlitch();
      await typeLine(randomCorrupt("> allied route confirmed"), 14);
      await sleep(550);
      await typeLine("> rain.wlr got you this far", 18);
      await sleep(600);
      await typeLine("> communications relay available", 18);
      await sleep(400);
      await typeLine("> type CONNECT", 18);
    }

    async function openCommsSequence() {
      await typeLine("> opening communications relay...", 16);
      await sleep(500);
      triggerGlitch();
      await typeLine(randomCorrupt("> handshake unstable"), 14);
      await sleep(700);
      await typeLine("> allied process connected :: rain.wlr", 18);
      await sleep(500);
      await typeLine("rain.wlr: if you can read this, the reroute held.", 18);
      await sleep(450);
      await typeLine("rain.wlr: don’t waste time. this channel is not clean.", 18);
      await sleep(450);
      await typeLine("rain.wlr: type HELP.", 18);
      commsUnlocked = true;
    }

    async function glitchBurst() {
      triggerGlitch();
      const bursts = [
        randomCorrupt("> signal interference"),
        randomCorrupt("> mirror desync"),
        randomCorrupt("> non-public process observing"),
        randomCorrupt("> relay noise spike"),
        randomCorrupt("> packet loss rising")
      ];
      await typeLine(bursts[Math.floor(Math.random() * bursts.length)], 10);
    }

    let state = {
  greeted: false,
  warned: false,
  dataGiven: false,
  logsSeen: false,
  traceLevel: 0,
  instability: 0
};

async function handleCommsCommand(raw) {
  const cmd = raw.toLowerCase().trim();

  if (!commsUnlocked) {
    if (cmd === "connect") {
      await openCommsSequence();
      return;
    }

    await typeLine("> communications relay locked", 16);
    await typeLine("> type CONNECT", 16);
    return;
  }

  if (!state.greeted) {
    state.greeted = true;

    await typeLine("rain.wlr: ...you shouldn't be here.", 16);
    await sleep(500);
    await typeLine("rain.wlr: but since you are, listen carefully.", 16);
    await sleep(500);
    await typeLine("rain.wlr: do not trigger anything you don't understand.", 16);
  }

  if (cmd === "help") {
    await typeLine("available:", 16);
    await typeLine("STATUS  :: system condition", 16);
    await typeLine("DATA    :: retrieve files", 16);
    await typeLine("LOGS    :: recent activity", 16);
    await typeLine("TRACE   :: check exposure level", 16);
    await typeLine("RAIN    :: direct channel", 16);
    await typeLine("EXIT    :: terminate session", 16);
    return;
  }

  if (cmd === "status") {
    await typeLine("> relay integrity :: unstable", 16);
    await sleep(300);
    await typeLine("> trace risk :: " + (state.traceLevel > 2 ? "HIGH" : "MODERATE"), 16);

    if (!state.warned) {
      state.warned = true;
      await sleep(400);
      await typeLine("rain.wlr: you're lingering.", 16);
    }

    return;
  }

  if (cmd === "data") {
    if (!state.dataGiven) {
      state.dataGiven = true;

      await typeLine("rain.wlr: sending...", 16);
      await sleep(800);

      await typeHTMLLine(`<a href="/files/Op7-Data.rar" target="_blank">/files/Op7-Data.rar</a>`);
      await sleep(300);
      await typeHTMLLine(`<a href="/files/Remember-It.png" target="_blank">/files/Remember-It.png</a>`);

      await sleep(500);
      await typeLine("rain.wlr: that's everything i could pull.", 16);
    } else {
      await typeLine("rain.wlr: you already have it.", 16);
    }

    return;
  }

  if (cmd === "logs") {
    state.logsSeen = true;

    await typeLine("> retrieving logs...", 16);
    await sleep(500);

    await typeLine("> node_7 breach detected", 16);
    await typeLine("> unauthorized relay opened", 16);
    await typeLine("> observer ping detected", 16);

    state.traceLevel++;

    return;
  }

  if (cmd === "trace") {
    await typeLine("> trace level :: " + state.traceLevel, 16);

    if (state.traceLevel >= 3) {
      await sleep(400);
      await typeLine("rain.wlr: they're getting closer.", 16);
    }

    async function triggerObserverKill() {
  triggerGlitch();

  await typeLine(randomCorrupt("> unauthorized reference detected"), 10);
  await sleep(400);

  await typeLine("OBSERVER: you were not invited.", 16);
  await sleep(700);

  await typeLine("> trace spike detected", 16);
  await sleep(500);

  await typeLine("> connection overridden", 16);
  await sleep(500);

  await typeLine("> terminating...", 16);
  await sleep(800);

  input.disabled = true;

  await sleep(1500);

  window.location.href = "/";
}
    
    return;
  }

  if (cmd === "rain") {
    await typeLine("rain.wlr: i don't have long.", 16);
    await sleep(400);
    await typeLine("rain.wlr: this system isn't supposed to be accessed externally.", 16);
    return;
  }

  if (cmd === "exit") {
    await typeLine("> closing channel...", 16);
    await sleep(800);
    window.location.href = "/";
    return;
  }

  if (cmd.includes("observer")) {
    triggerObserverKill();
    return;
  }

  if (Math.random() < 0.25) {
    triggerGlitch();
    await typeLine(randomCorrupt("> signal disturbance"), 10);
    state.traceLevel++;
  }

  await typeLine("> command not recognized", 16);
}

    input.addEventListener("keydown", async (e) => {
      if (e.key !== "Enter") return;

      const value = input.value.trim();
      if (!value) return;
      input.value = "";

      await printUserInput(value);

      if (stage === "login_user") {
        loginUser = value;
        stage = "login_pass";
        await typeLine("password:", 18);
        return;
      }

      if (stage === "login_pass") {
        if (loginUser === SECOND_USER && value === SECOND_PASS) {
          stage = "terminal";
          await loginSuccessSequence();
        } else {
          triggerGlitch();
          await typeLine("> access denied", 16);
          await sleep(250);
          await typeLine("username:", 18);
          stage = "login_user";
        }
        return;
      }

      if (stage === "terminal") {
        await handleCommsCommand(value);
      }
    });

    setInterval(async () => {
      if (stage === "terminal" && commsUnlocked && Math.random() < 0.18) {
        const line = document.createElement("div");
        line.className = "faint fade-in";
        line.textContent = randomCorrupt("> background noise detected");
        terminal.appendChild(line);
        scrollDown();
      }
    }, 7000);

    setInterval(() => {
      if (Math.random() < 0.08) {
        triggerGlitch();
      }
    }, 9000);

    bootSequence();
  </script>
</body>
</html>
