<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VONROSA NODE</title>
<style>
    body {
        background-color: black;
        color: #00ff9c;
        font-family: monospace;
        margin: 0;
        padding: 20px;
    }

    #terminal {
        white-space: pre-wrap;
        line-height: 1.4em;
    }

    input {
        background: black;
        border: none;
        color: #00ff9c;
        font-family: monospace;
        font-size: 16px;
        outline: none;
        width: 90%;
    }

    .hidden {
        display: none;
    }
</style>
</head>

<body>

<div id="terminal"></div>
<input id="input" autofocus />

<script>
const terminal = document.getElementById("terminal");
const input = document.getElementById("input");

let stage = "login_user";

function typeLine(text, delay = 40) {
    return new Promise(resolve => {
        let i = 0;
        const interval = setInterval(() => {
            terminal.innerHTML += text.charAt(i);
            i++;
            if (i >= text.length) {
                clearInterval(interval);
                terminal.innerHTML += "\n";
                resolve();
            }
        }, delay);
    });
}

async function boot() {
    await typeLine("> connection attempt detected...");
    await delay(500);
    await typeLine("> verifying...");
    await delay(500);
    await typeLine("> access requires authentication\n");
    await typeLine("username:");
}

function delay(ms) {
    return new Promise(res => setTimeout(res, ms));
}

input.addEventListener("keydown", async function(e) {
    if (e.key === "Enter") {
        let value = input.value.trim();
        terminal.innerHTML += value + "\n";
        input.value = "";

        if (stage === "login_user") {
            window.username = value;
            stage = "login_pass";
            await typeLine("password:");
        }

        else if (stage === "login_pass") {
            if (value === "open.channel") {
                stage = "terminal";

                await typeLine("\n> access granted\n");
                await delay(500);
                await typeLine("you shouldn't be here.");
                await delay(1000);
                await typeLine("\n...good.\n");
                await delay(1200);
                await typeLine("> observer is already active\n");
                await delay(1000);
                await typeLine("> we don't have much time\n");
                await delay(800);
                await typeLine("\n>");
            } else {
                await typeLine("> access denied\n");
                await delay(500);
                await typeLine("username:");
                stage = "login_user";
            }
        }

        else if (stage === "terminal") {
            handleCommand(value);
        }
    }
});

async function handleCommand(cmd) {
    cmd = cmd.toLowerCase();

    if (cmd === "help") {
        await typeLine("available commands:");
        await typeLine("help");
        await typeLine("status");
        await typeLine("whoami");
    }

    else if (cmd === "status") {
        await typeLine("> system unstable...");
        await delay(500);
        await typeLine("> sector 965 active");
    }

    else if (cmd === "whoami") {
        await typeLine("> unknown");
        await delay(500);
        await typeLine("> but not alone");
    }

    else {
        await typeLine("> command not recognized");
    }

    terminal.innerHTML += "\n>";
}

boot();
</script>

</body>
</html>
