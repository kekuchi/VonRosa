<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VonRosa — Bio-Elixirs Division</title>

  <style>
    body {
      margin: 0;
      font-family: Inter, sans-serif;
      background: #050b10;
      color: #eaf6ff;
    }

    .container {
      width: min(1100px, 90%);
      margin: auto;
    }

    header {
      padding: 20px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      width: 28px;
    }

    .hero {
      padding: 80px 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: center;
    }

    .hero img {
      width: 100%;
      border-radius: 12px;
      opacity: 0.9;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 16px;
    }

    p {
      opacity: 0.8;
      line-height: 1.6;
    }

    .tag {
      font-size: 12px;
      letter-spacing: 2px;
      opacity: 0.5;
      margin-bottom: 12px;
    }

    @media (max-width: 800px) {
      .hero {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="container brand">
    <img src="/assets/logo.png" class="brand-logo">
    <div>
      <div>VONROSA</div>
      <div style="font-size:12px;opacity:0.6;">Bio-Elixirs Division</div>
    </div>
  </div>
</header>

<section class="container hero">

  <div>
    <div class="tag">INFRASTRUCTURE INTELLIGENCE</div>
    <h1>Architecting Intelligent Cities</h1>

    <p>
      Adaptive systems regulating transport, energy, and communication networks in real-time, ensuring seamless continuity across urban environments.
    </p>

    <p style="margin-top:20px;opacity:0.6;">
      "Control is not imposed. It is integrated."
    </p>
  </div>

  <img src="/assets/infrastructure.jpg">

</section>

</body>
</html>
